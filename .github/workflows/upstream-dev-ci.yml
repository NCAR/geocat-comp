name: CI Upstream
on:
  workflow_dispatch:
  schedule:
     - cron: '0 0 * * *' # Daily “At 00:00”

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upstream-dev-numpy:
    name:  upstream-dev-numpy
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    outputs:
      testresults: ${{ steps.tests.outcome }}

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: set up environment
        id: env-setup
        continue-on-error: true
        uses: mamba-org/setup-micromamba@0dea6379afdaffa5d528b3d1dabc45da37f443fc # v2
        with:
          environment-file: build_envs/environment.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: retry environment set up if failed
        if: steps.env-setup.outcome == 'failure'
        uses: mamba-org/setup-micromamba@0dea6379afdaffa5d528b3d1dabc45da37f443fc # v2
        with:
          download-micromamba: false
          environment-file: build_envs/environment.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: conda list
        run: |
          conda list

      - name: Install upstream versions
        run: |
          bash ci/install-upstream-numpy.sh

      - name: Install geocat-comp
        run: |
          python -m pip install . --no-deps

      - name: conda list
        run: |
          conda list

      - name: Run Tests
        id: tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            eval "$(micromamba shell hook --shell bash)"
            micromamba activate
            micromamba activate geocat_comp_build
            python -m pytest test -v -m "not uxarray" --cov=./geocat/comp --cov-report=xml

  upstream-dev-with-uxarray:
    name:  upstream-dev-with-uxarray
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    outputs:
      testresults: ${{ steps.tests.outcome }}

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: set up environment
        id: env-setup
        continue-on-error: true
        uses: mamba-org/setup-micromamba@0dea6379afdaffa5d528b3d1dabc45da37f443fc # v2
        with:
          environment-file: build_envs/environment.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: retry environment set up if failed
        if: steps.env-setup.outcome == 'failure'
        uses: mamba-org/setup-micromamba@0dea6379afdaffa5d528b3d1dabc45da37f443fc # v2
        with:
          download-micromamba: false
          environment-file: build_envs/environment.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: conda list
        run: |
          conda list

      - name: Install upstream versions
        run: |
          bash ci/install-upstream-uxarray.sh

      - name: Install geocat-comp
        run: |
          python -m pip install . --no-deps

      - name: conda list
        run: |
          conda list

      - name: Run Tests
        id: tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 60
          max_attempts: 3
          command: |
            eval "$(micromamba shell hook --shell bash)"
            micromamba activate
            micromamba activate geocat_comp_build
            python -m pytest test -v --last-failed --cov=./geocat/comp --cov-report=xml

  failure-issue:
    name: failure-issue
    needs: [upstream-dev-numpy, upstream-dev-with-uxarray]
    if: |
      (needs.upstream-dev-numpy.outputs.testresults != 'success' || needs.upstream-dev-with-uxarray.outputs.testresults != 'success')
      && github.repository == 'NCAR/geocat-comp'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: Create or update failure issue
        shell: bash
        run: |
          # Read the template
          template=$(cat .github/upstream-failure-issue-template.md)

          # Replace placeholders
          issue_body="${template//\{\{WORKFLOW\}\}/${{ github.workflow }}}"
          issue_body="${issue_body//\{\{RUN_ID\}\}/${{ github.run_id }}}"
          issue_body="${issue_body//\{\{RUN_URL\}\}/${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"
          issue_body="${issue_body//\{\{DATE\}\}/$(date -u)}"

          # Check for existing open issue with same title
          issue_title="🤖 Upstream testing failure"
          existing_issue=$(gh issue list --state open --label "testing" --search "\"$issue_title\" in:title" --json number --jq '.[0].number // empty')

          if [ -n "$existing_issue" ]; then
            echo "Found existing open issue #$existing_issue, updating it..."
            echo "$issue_body" | gh issue edit "$existing_issue" --body-file -
            echo "Updated existing issue #$existing_issue"
          else
            echo "No existing open issue found, creating new one..."
            echo "$issue_body" | gh issue create \
              --title "$issue_title" \
              --body-file - \
              --label "testing"
            echo "Created new issue"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  report-failed:
    name: report-failed
    needs: [upstream-dev-numpy, upstream-dev-with-uxarray, failure-issue]
    if: ${{needs.upstream-dev-numpy.outputs.testresults != 'success' || needs.upstream-dev-with-uxarray.outputs.testresults != 'success'}}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: make sure to report a failed workflow
        shell: bash
        run: |
          exit 1;
